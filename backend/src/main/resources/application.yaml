spring:
  application:
    name: mrbatri-backend

  # 1. PostgreSQL Connection
  datasource:
    url: jdbc:postgresql://localhost:5432/mrbatridb
    username: admin
    password: secretpassword
    driver-class-name: org.postgresql.Driver

  # 2. JPA / Hibernate Settings
  jpa:
    hibernate:
      # 'update' will create/modify tables based on your Kotlin classes automatically.
      # In production, we change this to 'none' and use migrations.
      ddl-auto: update 
    show-sql: true # Prints every SQL query to your console (great for learning)
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # 3. Redis Connection (for your OTP logic)
  data:
    redis:
      host: localhost
      port: 6379

# 4. Observability (Health & Metrics)
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always

minio:
  url: http://localhost:9000
  access-key: admin
  secret-key: secretpassword
  bucket-name: products

app:
  jwt:
    # Override in production via JWT_SECRET environment variable.
    # Must be at least 256-bit (64 hex chars). Never commit a real secret here.
    secret: ${JWT_SECRET:8A2B5C8D1E4F7A9B2C5D8E1F4A7B0C3D6E9F2A5B8C1D4E7F0A3B6C9D2E5F8A1B}